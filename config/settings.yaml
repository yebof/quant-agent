api_keys:
  anthropic: "${ANTHROPIC_API_KEY}"
  fred: "${FRED_API_KEY}"
  alpaca_key: "${ALPACA_API_KEY}"
  alpaca_secret: "${ALPACA_SECRET_KEY}"

alpaca:
  base_url: "https://paper-api.alpaca.markets"  # paper trading
  paper: true

llm:
  analyst_model: "claude-sonnet-4-6"
  decision_model: "claude-opus-4-6"
  risk_model: "claude-opus-4-6"
  earnings_model: "claude-opus-4-6"
  max_tokens: 16384

risk:
  max_position_pct: 20
  max_total_position_pct: 90
  max_daily_loss_pct: 3
  max_sector_pct: 40
  require_stop_loss: true

trading:
  universe:
    # Index ETF
    - SPY    # S&P 500
    - QQQ    # Nasdaq 100
    - IWM    # Russell 2000
    - DIA    # Dow Jones
    # Sector ETF
    - XLF    # Financial
    - XLE    # Energy
    - XLV    # Healthcare
    - XLI    # Industrial
    - XLP    # Consumer Staples
    - XLY    # Consumer Discretionary
    - XLU    # Utilities
    - XLRE   # Real Estate
    - XLB    # Materials
    # Tech
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - META
    - AVGO
    - CRM
    - AMD
    - ORCL
    # Finance
    - JPM
    - GS
    - V
    - MA
    - BAC
    # Healthcare
    - UNH
    - JNJ
    - LLY
    - PFE
    - ABT
    # Energy
    - XOM
    - CVX
    - COP
    # Consumer
    - COST
    - WMT
    - MCD
    - PG
    - KO
    - SBUX
    - NKE
    - HD
    # Industrial
    - CAT
    - GE
    - HON
    - UPS
    - BA
    - DE
    # Communication & Entertainment
    - NFLX
    - DIS
    - CMCSA
    # Materials & Utilities
    - LIN
    - NEE
    # Real Estate
    - AMT
    - PLD
  lookback_days: 120
  schedule:
    morning: "06:00"
    midday: "12:00"
    evening: "16:30"

storage:
  db_path: "data/quant_agent.db"
