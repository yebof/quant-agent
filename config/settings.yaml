api_keys:
  anthropic: "${ANTHROPIC_API_KEY}"
  openai: "${OPENAI_API_KEY}"
  fred: "${FRED_API_KEY}"
  alpaca_key: "${ALPACA_API_KEY}"
  alpaca_secret: "${ALPACA_SECRET_KEY}"

alpaca:
  base_url: "https://paper-api.alpaca.markets"  # paper trading
  paper: true

llm:
  tech_analyst_model: "gpt-5.4"
  news_analyst_model: "gpt-5.4"
  macro_analyst_model: "gpt-5.4"
  earnings_analyst_model: "gpt-5.4"
  portfolio_manager_model: "gpt-5.4"
  risk_manager_model: "gpt-5.4"
  position_reviewer_model: "gpt-5.4"
  evening_analyst_model: "gpt-5.4"
  max_tokens: 128000

risk:
  max_position_pct: 20
  max_total_position_pct: 90
  max_daily_loss_pct: 3
  max_sector_pct: 40
  require_stop_loss: true
  # Cash-only by default. Flip to true to allow margin — BUYs can then spend
  # beyond available cash. When false (default) the risk engine hard-blocks
  # any BUY that would drive cash negative, and the PM + midday prompts get
  # a mandatory de-lever directive when cash is already negative.
  allow_margin: false

trading:
  universe:
    # Index ETF
    - SPY    # S&P 500
    - QQQ    # Nasdaq 100
    - IWM    # Russell 2000
    - DIA    # Dow Jones
    # Sector ETF
    - XLF    # Financial
    - XLE    # Energy
    - XLV    # Healthcare
    - XLI    # Industrial
    - XLP    # Consumer Staples
    - XLY    # Consumer Discretionary
    - XLU    # Utilities
    - XLRE   # Real Estate
    - XLB    # Materials
    - SMH    # Semiconductor (VanEck)
    - DRAM   # Memory/Storage Semiconductor (Roundhill)
    # Inverse / Short ETF
    - SH     # Short S&P 500
    - SDS    # 2x Short S&P 500
    - PSQ    # Short Nasdaq 100
    - SQQQ   # 3x Short Nasdaq 100
    # Tech
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - META
    - AVGO
    - CRM
    - AMD
    - ORCL
    - MU
    - NET
    # Finance
    - JPM
    - GS
    - V
    - MA
    - BAC
    - BRK-B
    # Healthcare
    - UNH
    - JNJ
    - LLY
    - PFE
    - ABT
    # Energy
    - XOM
    - CVX
    - COP
    - EQNR   # Equinor (Norwegian energy)
    # Consumer
    - COST
    - WMT
    - MCD
    - PG
    - KO
    - SBUX
    - NKE
    - HD
    # Industrial
    - CAT
    - GE
    - HON
    - UPS
    - BA
    - DE
    - AGX
    - DXPE
    - RKLB   # Rocket Lab
    # Cybersecurity
    - ZS     # Zscaler
    # Wireless / IoT
    - ONDS   # Ondas
    # Communication & Entertainment
    - NFLX
    - DIS
    - CMCSA
    # Materials & Utilities & Nuclear
    - LIN
    - MP     # MP Materials (rare earth)
    - NEE
    - VST    # Vistra (power/nuclear)
    - OKLO   # Oklo (nuclear)
    # Real Estate
    - WDC
    - SNDK
    - AMT
    - PLD
  lookback_days: 120
  # NOTE: these times are only consumed by `main.py --mode live` (APScheduler).
  # Production runs via launchd — see `src/trading_calendar.py SESSION_WINDOWS`
  # for the authoritative ET windows and `scripts/run_if_et_window.sh` for the
  # launchd-gated wrapper. The `intra_check` time here is meaningless in prod
  # (launchd fires it every 30-min tick across 09:30-16:00 ET; see wrapper).
  schedule:
    earnings_preprocess: "05:00"
    morning: "06:00"
    intra_check: "10:30"
    midday: "13:00"       # moved from 15:00 — afternoon lull, before EOD noise
    close: "15:30"        # new — 25min before close, triggers-only sell-only
    evening: "16:30"

storage:
  db_path: "data/quant_agent.db"
