api_keys:
  anthropic: "${ANTHROPIC_API_KEY}"
  fred: "${FRED_API_KEY}"
  alpaca_key: "${ALPACA_API_KEY}"
  alpaca_secret: "${ALPACA_SECRET_KEY}"

alpaca:
  base_url: "https://paper-api.alpaca.markets"  # paper trading
  paper: true

llm:
  analyst_model: "claude-haiku-4-5-20251001"
  decision_model: "claude-sonnet-4-6-20250514"
  risk_model: "claude-sonnet-4-6-20250514"
  max_tokens: 2048

risk:
  max_position_pct: 20
  max_total_position_pct: 90
  max_daily_loss_pct: 3
  max_sector_pct: 40
  require_stop_loss: true

trading:
  universe: ["SPY", "QQQ", "NVDA"]
  lookback_days: 120
  schedule:
    morning: "06:00"
    midday: "12:00"
    evening: "16:30"

storage:
  db_path: "data/quant_agent.db"
