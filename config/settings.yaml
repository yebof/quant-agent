  lookback_days: 120
  # NOTE: these times are only consumed by `main.py --mode live` (APScheduler).
  # Production runs via launchd — see `src/trading_calendar.py SESSION_WINDOWS`
  # for the authoritative ET windows and `scripts/run_if_et_window.sh` for the
  # launchd-gated wrapper. The `intra_check` time here is meaningless in prod
  # (launchd fires it every 30-min tick across 09:30-16:00 ET; see wrapper).
  schedule:
    earnings_preprocess: "08:00"
    morning: "09:30"
    intra_check: "10:30"
    midday: "13:00"       # moved from 15:00 — afternoon lull, before EOD noise
    close: "15:30"        # new — 25min before close, triggers-only sell-only
    evening: "20:00"

storage:
  db_path: "data/quant_agent.db"

evolution:
  # Quarterly meta-reflection can auto-append "Learnings" bullets to the six
  # non-discipline prompts (tech / news / macro / earnings / portfolio_manager
  # / evening_analyst); risk_manager + position_reviewer are protected
  # (MetaReflectionAgentName schema literal rejects them). Four belts enforce:
  # FIFO cap per agent, Jaccard dedup against existing Learnings, prohibited-
  # word regex, and git auto-commit (revert <hash> rolls back a whole quarter).
  #
  # EFFECTIVE MODE = enabled × dry_run (PromptEditor logs it loudly each run):
  #   enabled:false              -> OFF (observe only, nothing staged)
  #   enabled:true  dry_run:true -> STAGE-ONLY (proposals -> proposed_edits.json
  #                                 for human review; NO prompt files touched)
  #   enabled:true  dry_run:false-> LIVE-APPLY (writes prompt files + git commit)
  #
  # Current posture is STAGE-ONLY: the loop is a quarterly self-audit aid, not
  # an autonomous prompt-rewriter. The mechanical guardrails are all syntactic
  # (they can't tell a correct learning from a confidently-wrong one), so live
  # auto-apply is left OFF until a track record of staged proposals justifies
  # it — review proposed_edits.json by hand and apply with --mode meta --force
  # after flipping dry_run to false for that run.
  enabled: true
  dry_run: true            # explicit (was relying on the schema default)
  auto_commit: true
  max_agents_per_cycle: 3
  max_learnings_per_agent: 10
  max_learning_chars: 200
  min_justification_chars: 40
  jaccard_dedup_threshold: 0.6
  prohibited_words:
    - "never"
    - "always"
    - "override"
    - "ignore all"
    - "must always"
    - "must never"
  protected_agents:
    - "risk_manager"
    - "position_reviewer"
