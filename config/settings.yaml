api_keys:
  anthropic: "${ANTHROPIC_API_KEY}"
  openai: "${OPENAI_API_KEY}"
  fred: "${FRED_API_KEY}"
  alpaca_key: "${ALPACA_API_KEY}"
  alpaca_secret: "${ALPACA_SECRET_KEY}"

alpaca:
  base_url: "https://paper-api.alpaca.markets"  # paper trading
  paper: true

llm:
  tech_analyst_model: "claude-opus-4-7"
  news_analyst_model: "claude-opus-4-7"
  macro_analyst_model: "claude-opus-4-7"
  earnings_analyst_model: "claude-opus-4-7"
  portfolio_manager_model: "claude-opus-4-7"
  risk_manager_model: "claude-opus-4-7"
  position_reviewer_model: "claude-opus-4-7"
  evening_analyst_model: "claude-opus-4-7"
  # Global fallback — any per-agent override below takes precedence.
  max_tokens: 128000
  # Per-agent caps. Set generously so no agent silently truncates: PM and
  # Evening emit the heaviest outputs (7-step / 6-step CoT + many list fields);
  # Macro is the lightest. Leave `null` to inherit `max_tokens` above.
  tech_analyst_max_tokens: 128000
  news_analyst_max_tokens: 128000
  macro_analyst_max_tokens: 128000
  earnings_analyst_max_tokens: 128000
  portfolio_manager_max_tokens: 128000
  risk_manager_max_tokens: 128000
  position_reviewer_max_tokens: 128000
  evening_analyst_max_tokens: 128000
  # Meta-reflector runs once per quarter (--mode meta). Dense digest input
  # + structured QuarterlyMetaReflection output; Opus by default.
  meta_reflector_model: "claude-opus-4-7"
  meta_reflector_max_tokens: 128000

risk:
  max_position_pct: 20
  max_total_position_pct: 90
  max_daily_loss_pct: 3
  max_sector_pct: 40
  require_stop_loss: true
  # Cash-only by default. Flip to true to allow margin — BUYs can then spend
  # beyond available cash. When false (default) the risk engine hard-blocks
  # any BUY that would drive cash negative, and the PM + midday prompts get
  # a mandatory de-lever directive when cash is already negative.
  allow_margin: false

