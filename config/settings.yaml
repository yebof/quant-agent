api_keys:
  anthropic: "${ANTHROPIC_API_KEY}"
  openai: "${OPENAI_API_KEY}"
  fred: "${FRED_API_KEY}"
  alpaca_key: "${ALPACA_API_KEY}"
  alpaca_secret: "${ALPACA_SECRET_KEY}"

alpaca:
  base_url: "https://paper-api.alpaca.markets"  # paper trading
  paper: true

llm:
  tech_analyst_model: "gpt-5.4"
  news_analyst_model: "gpt-5.4"
  macro_analyst_model: "gpt-5.4"
  earnings_analyst_model: "gpt-5.4"
  portfolio_manager_model: "gpt-5.4"
  risk_manager_model: "gpt-5.4"
  position_reviewer_model: "gpt-5.4"
  evening_analyst_model: "gpt-5.4"
  # Global fallback — any per-agent override below takes precedence.
  max_tokens: 128000
  # Per-agent caps. Set generously so no agent silently truncates: PM and
  # Evening emit the heaviest outputs (7-step / 6-step CoT + many list fields);
  # Macro is the lightest. Leave `null` to inherit `max_tokens` above.
  tech_analyst_max_tokens: 128000
  news_analyst_max_tokens: 128000
  macro_analyst_max_tokens: 128000
  earnings_analyst_max_tokens: 128000
  portfolio_manager_max_tokens: 128000
  risk_manager_max_tokens: 128000
  position_reviewer_max_tokens: 128000
  evening_analyst_max_tokens: 128000
  # Meta-reflector runs once per quarter (--mode meta). Dense digest input
  # + structured QuarterlyMetaReflection output; Opus by default.
  meta_reflector_model: "gpt-5.4"
  meta_reflector_max_tokens: 128000

risk:
  max_position_pct: 20
  max_total_position_pct: 90
  max_daily_loss_pct: 3
  max_sector_pct: 40
  require_stop_loss: true
  # Cash-only by default. Flip to true to allow margin — BUYs can then spend
  # beyond available cash. When false (default) the risk engine hard-blocks
  # any BUY that would drive cash negative, and the PM + midday prompts get
  # a mandatory de-lever directive when cash is already negative.
  allow_margin: false

trading:
  universe:
    # Index ETF
    - SPY    # S&P 500
    - QQQ    # Nasdaq 100
    - IWM    # Russell 2000
    - DIA    # Dow Jones
    # Sector ETF
    - XLF    # Financial
    - XLE    # Energy
    - XLV    # Healthcare
    - XLI    # Industrial
    - XLP    # Consumer Staples
    - XLY    # Consumer Discretionary
    - XLU    # Utilities
    - XLRE   # Real Estate
    - XLB    # Materials
    - SMH    # Semiconductor (VanEck)
    - SOXX   # Semiconductor (iShares — different weightings than SMH)
    - DRAM   # Memory/Storage Semiconductor (Roundhill)
    - CHPX   # Sector ETF
    # Inverse / Short ETF
    - SH     # Short S&P 500
    - SDS    # 2x Short S&P 500
    - PSQ    # Short Nasdaq 100
    - SQQQ   # 3x Short Nasdaq 100
    # Tech
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - META
    - AVGO
    - CRM
    - AMD
    - ORCL
    - MU
    - NET
    - PATH   # UiPath (RPA / AI automation)
    # Finance
    - JPM
    - GS
    - V
    - MA
    - BAC
    - BRK-B
    # Healthcare
    - UNH
    - JNJ
    - LLY
    - PFE
    - ABT
    # Energy
    - XOM
    - CVX
    - COP
    - EQNR   # Equinor (Norwegian energy)
    # Consumer
    - COST
    - WMT
    - MCD
    - PG
    - KO
    - SBUX
    - NKE
    - HD
    - GME    # GameStop (speculative / meme profile — RM tends to size small)
    # Industrial
    - CAT
    - GE
    - HON
    - UPS
    - BA
    - DE
    - AGX
    - DXPE
    - RKLB   # Rocket Lab
    # Cybersecurity
    - ZS     # Zscaler
    # Wireless / IoT
    - ONDS   # Ondas
    # Communication & Entertainment
    - NFLX
    - DIS
    - CMCSA
    # Materials & Utilities & Nuclear & Power Transition
    - LIN
    - MP     # MP Materials (rare earth)
    - NEE
    - VST    # Vistra (power/nuclear)
    - OKLO   # Oklo (nuclear)
    - CEG    # Constellation Energy (nuclear utility)
    - GEV    # GE Vernova (GE power-transition spinoff, Apr 2024)
    - ENPH   # Enphase Energy (solar inverters)
    - FLNC   # Fluence Energy (utility-scale battery storage)
    # Real Estate
    - WDC
    - SNDK
    - AMT
    - PLD
  lookback_days: 120
  # NOTE: these times are only consumed by `main.py --mode live` (APScheduler).
  # Production runs via launchd — see `src/trading_calendar.py SESSION_WINDOWS`
  # for the authoritative ET windows and `scripts/run_if_et_window.sh` for the
  # launchd-gated wrapper. The `intra_check` time here is meaningless in prod
  # (launchd fires it every 30-min tick across 09:30-16:00 ET; see wrapper).
  schedule:
    earnings_preprocess: "08:00"
    morning: "09:30"
    intra_check: "10:30"
    midday: "13:00"       # moved from 15:00 — afternoon lull, before EOD noise
    close: "15:30"        # new — 25min before close, triggers-only sell-only
    evening: "20:00"

storage:
  db_path: "data/quant_agent.db"

evolution:
  # Quarterly meta-reflection can auto-append "Learnings" bullets to the six
  # non-discipline prompts (tech / news / macro / earnings / portfolio_manager
  # / evening_analyst). When enabled, PromptEditor applies reflection.json
  # proposals at end-of-quarter; risk_manager + position_reviewer are
  # protected (MetaReflectionAgentName schema literal rejects them). Four
  # belts still enforce: FIFO cap per agent, Jaccard dedup against existing
  # Learnings, prohibited-word regex, and git auto-commit (revert <hash>
  # rolls back a whole quarter). Flip back to false any time — already-
  # applied learnings stay put; use the retract path to remove specifics.
  enabled: true
  auto_commit: true
  max_agents_per_cycle: 3
  max_learnings_per_agent: 10
  max_learning_chars: 200
  min_justification_chars: 40
  jaccard_dedup_threshold: 0.6
  prohibited_words:
    - "never"
    - "always"
    - "override"
    - "ignore all"
    - "must always"
    - "must never"
  protected_agents:
    - "risk_manager"
    - "position_reviewer"
